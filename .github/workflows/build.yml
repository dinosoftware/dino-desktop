name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  packages: write

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: windows/amd64
            os: windows-latest
          - platform: darwin/universal
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.platform == 'linux/amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev nsis

      - name: Build Wails app (Windows with NSIS)
        if: matrix.platform == 'windows/amd64'
        run: wails build -platform ${{ matrix.platform }} -nsis

      - name: Build Wails app
        if: matrix.platform != 'windows/amd64'
        run: wails build -platform ${{ matrix.platform }}

      - name: Package Linux
        if: matrix.platform == 'linux/amd64'
        run: |
          chmod +x build/bin/dino
          mkdir -p pkg/dino-linux-amd64
          cp build/bin/dino pkg/dino-linux-amd64/
          cp build/appicon.png pkg/dino-linux-amd64/dino.png
          cat > pkg/dino-linux-amd64/dino.desktop << 'EOF'
          [Desktop Entry]
          Name=Dino
          Comment=OpenSubsonic music player
          Exec=dino
          Icon=dino
          Type=Application
          Categories=Audio;Music;Player;
          StartupWMClass=Dino Desktop
          EOF
          tar -czf dino-linux-amd64.tar.gz -C pkg dino-linux-amd64

      - name: Build AppImage
        if: matrix.platform == 'linux/amd64'
        run: |
          mkdir -p Dino.AppDir/usr/bin
          mkdir -p Dino.AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/bin/dino Dino.AppDir/usr/bin/
          cp build/appicon.png Dino.AppDir/dino.png
          cp build/appicon.png Dino.AppDir/usr/share/icons/hicolor/256x256/apps/dino.png
          cat > Dino.AppDir/dino.desktop << 'EOF'
          [Desktop Entry]
          Name=Dino
          Comment=OpenSubsonic music player
          Exec=dino
          Icon=dino
          Type=Application
          Categories=Audio;Music;Player;
          StartupWMClass=Dino Desktop
          EOF
          cat > Dino.AppDir/AppRun << 'RUNEOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "${HERE}/usr/bin/dino" "$@"
          RUNEOF
          chmod +x Dino.AppDir/AppRun
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract >/dev/null 2>&1
          ./squashfs-root/AppRun Dino.AppDir dino-linux-amd64.AppImage

      - name: Package macOS
        if: matrix.platform == 'darwin/universal'
        run: |
          cd build/bin
          zip -r ../../dino-macos-universal.zip dino.app

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux/amd64'
        with:
          name: dino-linux-amd64
          path: |
            dino-linux-amd64.tar.gz
            dino-linux-amd64.AppImage

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'windows/amd64'
        with:
          name: dino-windows-amd64
          path: build/bin/*-installer.exe

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'darwin/universal'
        with:
          name: dino-macos-universal
          path: dino-macos-universal.zip

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - run: tar -czf dino-web.tar.gz -C frontend/dist .

      - uses: actions/upload-artifact@v4
        with:
          name: dino-web-html
          path: dino-web.tar.gz

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs:
      - build-desktop
      - build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: artifacts/*
