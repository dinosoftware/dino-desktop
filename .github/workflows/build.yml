name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
      build-binaries:
        description: "Build desktop binaries"
        type: boolean
        default: true
      build-docker:
        description: "Build and push Docker image"
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-desktop:
    if: inputs.build-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
          - platform: windows-amd64
            os: windows-latest
          - platform: darwin-universal
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux-amd64'
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Windows)
        if: matrix.platform == 'windows-amd64'
        run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.platform == 'darwin-universal'
        run: npx electron-builder --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux-amd64'
        with:
          name: dino-linux-amd64
          path: |
            dist-electron/*.AppImage
            dist-electron/*.tar.gz

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'windows-amd64'
        with:
          name: dino-windows-amd64
          path: dist-electron/*.exe

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'darwin-universal'
        with:
          name: dino-macos-universal
          path: dist-electron/*.dmg

  build-web:
    if: inputs.build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - run: tar -czf dino-web.tar.gz -C frontend/dist .

      - uses: actions/upload-artifact@v4
        with:
          name: dino-web-html
          path: dino-web.tar.gz

  build-docker:
    if: inputs.build-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs:
      - build-desktop
      - build-web
    if: inputs.build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dino-linux-amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: dino-macos-universal
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: dino-windows-amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: dino-web-html
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: artifacts/*
